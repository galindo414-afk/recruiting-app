<html lang="en">

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Recruiting Profile Builder</title>
<style>
  :root {
    --color-background-primary: #ffffff;
    --color-background-secondary: #f5f5f4;
    --color-background-tertiary: #f0efed;
    --color-background-info: #e6f1fb;
    --color-text-info: #0c447c;
    --color-background-success: #e1f5ee;
    --color-text-success: #085041;
    --color-background-warning: #faeeda;
    --color-text-warning: #633806;
    --color-background-danger: #fcebeb;
    --color-text-danger: #791f1f;
    --color-text-primary: #1a1a1a;
    --color-text-secondary: #595959;
    --color-text-tertiary: #8a8a8a;
    --color-border-tertiary: #e5e5e5;
    --color-border-info: #b8d4ec;
    --border-radius-md: 6px;
    --border-radius-lg: 10px;
    --font-mono: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace;
  }
  * { box-sizing: border-box; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    margin: 0;
    padding: 0;
    background: var(--color-background-secondary);
    color: var(--color-text-primary);
    line-height: 1.5;
  }
  .app-header {
    background: var(--color-background-primary);
    border-bottom: 1px solid var(--color-border-tertiary);
    padding: 12px 20px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    flex-wrap: wrap;
    gap: 12px;
  }
  .app-header h1 { font-size: 18px; font-weight: 600; margin: 0; }
  .app-header .actions { display: flex; gap: 8px; flex-wrap: wrap; }
  .app-container { max-width: 1100px; margin: 0 auto; padding: 20px; }
  button {
    border: 1px solid var(--color-border-tertiary);
    background: var(--color-background-primary);
    border-radius: var(--border-radius-md);
    padding: 6px 12px;
    font-size: 13px;
    cursor: pointer;
    font-family: inherit;
    color: var(--color-text-primary);
    transition: background 0.1s;
  }
  button:hover { background: var(--color-background-tertiary); }
  input, select, textarea {
    border: 1px solid var(--color-border-tertiary);
    background: var(--color-background-primary);
    border-radius: var(--border-radius-md);
    padding: 6px 10px;
    font-size: 14px;
    font-family: inherit;
    width: 100%;
    color: var(--color-text-primary);
  }
  textarea { resize: vertical; font-family: inherit; }
  .rpb-nav { display: flex; gap: 6px; margin-bottom: 1.25rem; flex-wrap: wrap; border-bottom: 1px solid var(--color-border-tertiary); padding-bottom: 10px; }
  .rpb-nav button { padding: 7px 12px; font-size: 13px; }
  .rpb-nav button.active { background: var(--color-background-info); color: var(--color-text-info); border-color: var(--color-border-info); }
  .rpb-card { background: var(--color-background-primary); border: 1px solid var(--color-border-tertiary); border-radius: var(--border-radius-lg); padding: 1rem 1.25rem; margin-bottom: 12px; }
  .rpb-field { display: flex; flex-direction: column; gap: 4px; margin-bottom: 12px; }
  .rpb-field label { font-size: 13px; color: var(--color-text-secondary); }
  .rpb-grid2 { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 12px; }
  .rpb-grid3 { display: grid; grid-template-columns: repeat(auto-fit, minmax(140px, 1fr)); gap: 10px; }
  .rpb-grid-stats { display: grid; grid-template-columns: repeat(auto-fit, minmax(75px, 1fr)); gap: 8px; }
  .rpb-stat-field label { font-size: 11px; color: var(--color-text-secondary); text-transform: uppercase; letter-spacing: 0.5px; }
  .rpb-stat-field input { padding: 6px 8px; text-align: center; font-size: 14px; }
  .rpb-metric { background: var(--color-background-secondary); border-radius: var(--border-radius-md); padding: 10px 12px; }
  .rpb-metric-label { font-size: 11px; color: var(--color-text-secondary); }
  .rpb-metric-value { font-size: 20px; font-weight: 500; margin-top: 2px; }
  .rpb-badge { display: inline-block; font-size: 11px; padding: 2px 8px; border-radius: var(--border-radius-md); margin-right: 6px; }
  .rpb-badge.juco { background: #E6F1FB; color: #0C447C; }
  .rpb-badge.naia { background: #FAEEDA; color: #633806; }
  .rpb-badge.d2 { background: #FBEAF0; color: #72243E; }
  .rpb-badge.d3 { background: #E1F5EE; color: #085041; }
  .rpb-badge.d1 { background: #FCEBEB; color: #791F1F; }
  .rpb-badge.p { background: #EEEDFE; color: #3C3489; }
  .rpb-badge.h { background: #E1F5EE; color: #085041; }
  .rpb-badge.f { background: #FAEEDA; color: #633806; }
  .rpb-badge.star { background: #FAEEDA; color: #633806; }
  .rpb-row { display: flex; justify-content: space-between; align-items: center; padding: 10px 0; border-bottom: 1px solid var(--color-border-tertiary); gap: 12px; }
  .rpb-row:last-child { border-bottom: none; }
  .rpb-empty { text-align: center; color: var(--color-text-tertiary); padding: 2rem 1rem; font-size: 14px; }
  .rpb-inline-btns { display: flex; gap: 6px; flex-wrap: wrap; }
  .rpb-inline-btns button { padding: 4px 10px; font-size: 12px; }
  .rpb-filter-row { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 12px; }
  .rpb-filter-row select, .rpb-filter-row input { flex: 1; min-width: 110px; }
  .rpb-email-box { background: var(--color-background-secondary); border-radius: var(--border-radius-md); padding: 12px; font-family: var(--font-mono); font-size: 13px; white-space: pre-wrap; max-height: 400px; overflow-y: auto; }
  .rpb-player-pill { display: inline-flex; background: var(--color-background-secondary); padding: 4px 10px; border-radius: var(--border-radius-md); font-size: 13px; cursor: pointer; margin-right: 6px; margin-bottom: 6px; }
  .rpb-player-pill.active { background: var(--color-background-info); color: var(--color-text-info); }
  .rpb-section-title { font-size: 15px; font-weight: 500; margin: 1.25rem 0 10px; }
  .rpb-section-title:first-child { margin-top: 0; }
  .rpb-subsection { font-size: 12px; font-weight: 500; color: var(--color-text-secondary); margin: 14px 0 6px; text-transform: uppercase; letter-spacing: 0.5px; }
  .rpb-toast { position: fixed; top: 20px; right: 20px; background: var(--color-background-success); color: var(--color-text-success); padding: 8px 14px; border-radius: var(--border-radius-md); font-size: 13px; opacity: 0; transition: opacity 0.3s; pointer-events: none; z-index: 100; box-shadow: 0 2px 8px rgba(0,0,0,0.1); }
  .rpb-toast.show { opacity: 1; }
  .rpb-todo-item { display: flex; gap: 10px; padding: 10px 0; border-bottom: 1px solid var(--color-border-tertiary); }
  .rpb-todo-item:last-child { border-bottom: none; }
  .rpb-todo-check { margin-top: 3px; width: 18px; height: 18px; flex-shrink: 0; cursor: pointer; }
  .rpb-todo-title { font-size: 14px; font-weight: 500; }
  .rpb-todo-title.done { text-decoration: line-through; color: var(--color-text-tertiary); font-weight: 400; }
  .rpb-todo-detail { font-size: 13px; color: var(--color-text-secondary); margin-top: 4px; line-height: 1.5; }
  .rpb-progress-bar { height: 6px; background: var(--color-background-secondary); border-radius: 3px; overflow: hidden; margin-top: 8px; }
  .rpb-progress-fill { height: 100%; background: #4ade80; transition: width 0.3s; }
  .rpb-category-header { font-size: 14px; font-weight: 500; display: flex; justify-content: space-between; align-items: center; margin-bottom: 6px; }
  .rpb-game-row { padding: 12px; border: 1px solid var(--color-border-tertiary); border-radius: var(--border-radius-md); margin-bottom: 8px; }
  .rpb-game-stats { display: flex; gap: 14px; flex-wrap: wrap; font-size: 13px; color: var(--color-text-secondary); margin-top: 4px; }
  .rpb-game-stats b { color: var(--color-text-primary); font-weight: 500; }
  .rpb-toggle { display: inline-flex; border: 1px solid var(--color-border-tertiary); border-radius: var(--border-radius-md); overflow: hidden; }
  .rpb-toggle button { border: none; border-radius: 0; border-right: 1px solid var(--color-border-tertiary); padding: 6px 14px; font-size: 13px; }
  .rpb-toggle button:last-child { border-right: none; }
  .rpb-toggle button.active { background: var(--color-background-info); color: var(--color-text-info); }
  .rpb-divider { border: none; border-top: 1px solid var(--color-border-tertiary); margin: 14px 0; }
  .rpb-status { font-size: 12px; padding: 2px 8px; border-radius: var(--border-radius-md); }
  .rpb-status.pending { background: var(--color-background-secondary); color: var(--color-text-secondary); }
  .rpb-status.sent { background: var(--color-background-info); color: var(--color-text-info); }
  .rpb-status.replied { background: var(--color-background-success); color: var(--color-text-success); }
  .rpb-status.overdue { background: var(--color-background-danger); color: var(--color-text-danger); }
  .btn-primary { background: var(--color-background-info); color: var(--color-text-info); border-color: var(--color-border-info); }
  .btn-danger { color: var(--color-text-danger); }
</style>
</head>

  <div id="rpb-content"></div>
</div>

  function ipToDec(ip) {
    if (!ip) return 0;
    const n = parseFloat(ip); if (isNaN(n)) return 0;
    const w = Math.floor(n); const f = Math.round((n - w) * 10);
    if (f === 1) return w + 1/3; if (f === 2) return w + 2/3; return w;
  }
  function decToIp(d) {
    const w = Math.floor(d); const f = d - w;
    if (f > 0.6) return w + 0.2; if (f > 0.3) return w + 0.1; return w;
  }

  function seasonStats(pid) {
    const gs = Object.values(state.games).filter(g => g.playerId === pid);
    const P = {ip:0,h:0,r:0,er:0,bb:0,so:0,bf:0,hbp:0,games:0};
    const H = {ab:0,h:0,r:0,rbi:0,bb:0,so:0,hr:0,d:0,t:0,hbp:0,sb:0,rab:0,rh:0,games:0};
    const F = {po:0,a:0,e:0,dp:0};
    gs.forEach(g => {
      if (g.pitching && g.pitching.ip) {
        P.ip += ipToDec(g.pitching.ip); P.h += +g.pitching.h||0; P.r += +g.pitching.r||0;
        P.er += +g.pitching.er||0; P.bb += +g.pitching.bb||0; P.so += +g.pitching.so||0;
        P.bf += +g.pitching.bf||0; P.hbp += +g.pitching.hbp||0; P.games++;
      }
      if (g.hitting && g.hitting.ab) {
        H.ab += +g.hitting.ab||0; H.h += +g.hitting.h||0; H.r += +g.hitting.r||0;
        H.rbi += +g.hitting.rbi||0; H.bb += +g.hitting.bb||0; H.so += +g.hitting.so||0;
        H.hr += +g.hitting.hr||0; H.d += +g.hitting.d||0; H.t += +g.hitting.t||0;
        H.hbp += +g.hitting.hbp||0; H.sb += +g.hitting.sb||0;
        H.rab += +g.hitting.rab||0; H.rh += +g.hitting.rh||0; H.games++;
      }
      if (g.fielding) {
        F.po += +g.fielding.po||0; F.a += +g.fielding.a||0;
        F.e += +g.fielding.e||0; F.dp += +g.fielding.dp||0;
      }
    });
    const era = P.ip>0 ? ((P.er*9)/P.ip).toFixed(2) : '—';
    const whip = P.ip>0 ? ((P.h+P.bb)/P.ip).toFixed(2) : '—';
    const baa = P.bf>P.bb+P.hbp ? (P.h/(P.bf-P.bb-P.hbp)).toFixed(3) : '—';
    const kp9 = P.ip>0 ? ((P.so*9)/P.ip).toFixed(1) : '—';
    const kbb = P.bb>0 ? (P.so/P.bb).toFixed(2) : (P.so>0?'∞':'—');
    const s1 = H.h - H.d - H.t - H.hr;
    const tb = s1 + H.d*2 + H.t*3 + H.hr*4;
    const avg = H.ab>0 ? (H.h/H.ab).toFixed(3) : '—';
    const od = H.ab+H.bb+H.hbp;
    const obp = od>0 ? ((H.h+H.bb+H.hbp)/od).toFixed(3) : '—';
    const slg = H.ab>0 ? (tb/H.ab).toFixed(3) : '—';
    const ops = (avg!=='—'&&obp!=='—'&&slg!=='—') ? (parseFloat(obp)+parseFloat(slg)).toFixed(3) : '—';
    const baRisp = H.rab>0 ? (H.rh/H.rab).toFixed(3) : '—';
    const ch = F.po+F.a+F.e;
    const fpct = ch>0 ? ((F.po+F.a)/ch).toFixed(3) : '—';
    return {
      pitching: {...P, ipDisplay:decToIp(P.ip).toFixed(1), era, whip, baa, kp9, kbb},
      hitting: {...H, avg, obp, slg, ops, baRisp},
      fielding: {...F, chances:ch, fpct}
    };
  }

    const posFull = p.position==='LHP'?'left-handed pitcher':p.position==='RHP'?'right-handed pitcher':p.position;
    const sig = `${p.name}\n${p.phone||''}${p.phone&&p.email?' | ':''}${p.email||''}`;

      subj = `${p.gradYear} ${p.position} — ${p.stateLoc||'CO'} — ${velo}`;

      subj = `${p.gradYear} ${p.position} — ${gpa.split(' ')[0]} — ${p.name}`;

    } else if (tier === 'd3') {
      subj = `${p.gradYear} student-athlete ${p.position} — ${gpa} — ${p.name}`;
      body = `Coach,\n\nMy name is ${p.name}, a ${p.gradYear} ${posFull} from ${p.school||'[school]'} in ${loc||'[city]'}. I'm looking for a program where I can compete at a high level while earning a strong academic degree.\n\n- GPA: ${gpa}\n- Position: ${p.position}${p.secondaryPos?' / '+p.secondaryPos:''}\n- B/T: ${p.bats}/${p.throws} · ${p.height||'[H]'} / ${p.weight||'[W]'}\n- Fastball: ${velo}${p.secondaryPitches?'\n- Pitch mix: '+p.secondaryPitches:''}${p.achievements?'\n- '+p.achievements.split('\n').join('\n- '):''}\n\n${p.summary||'I bring command, baseball IQ, and a team-first approach.'}\n\nVideo: ${p.videoUrl||'[link]'}\n\nThank you, Coach.\n\n${sig}`;
    } else if (tier === 'f1') {
      subj = `Following up — ${p.name} ${p.gradYear} ${p.position}`;

      try {
        const data = JSON.parse(e.target.result);
        if (!confirm('This will replace all current data. Continue?')) return;
        if (data.players) state.players = data.players;
        if (data.colleges) state.colleges = data.colleges;
        if (data.contacts) state.contacts = data.contacts;
        if (data.todos) state.todos = data.todos;
        if (data.games) state.games = data.games;
        if (data.activePlayerId) state.activePlayerId = data.activePlayerId;
        save('rpb_players', state.players);
        save('rpb_colleges', state.colleges);
        save('rpb_contacts', state.contacts);
        save('rpb_todos', state.todos);
        save('rpb_games', state.games);
        save('rpb_active', state.activePlayerId);
        toast('Imported');
        render();
      } catch (err) {
        alert('Import failed: ' + err.message);

  function render() {
    const c = document.getElementById('rpb-content');
    const PL = Object.values(state.players);

    if (state.view === 'players') {
      let h = `<div class="rpb-card"><div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:1rem;"><h2 style="margin:0;font-size:17px;font-weight:500;">Players</h2><button onclick="rpbNewPlayer()" class="btn-primary">+ New player</button></div>`;
      if (PL.length === 0) h += `<div class="rpb-empty">No players yet. Click "New player" to start.</div>`;
      else h += PL.map(p => {
        const cc = Object.keys(state.contacts).filter(k => k.startsWith(p.id+'_')).length;
        const gc = Object.values(state.games).filter(g => g.playerId === p.id).length;
        const td = state.todos[p.id]||{}; const tot = Object.values(TODO_TEMPLATE).flat().length;
        const dn = Object.values(td).filter(Boolean).length;
        const pct = tot>0 ? Math.round(dn/tot*100) : 0;
        return `<div class="rpb-row"><div style="flex:1;min-width:0;"><div style="font-weight:500;">${p.name||'Unnamed'}</div><div style="font-size:13px;color:var(--color-text-secondary);">${p.position||'—'} · ${p.gradYear} · ${gc} games · ${cc} schools · ${pct}% prep</div></div><div class="rpb-inline-btns"><button onclick="rpbSelectPlayer('${p.id}')">Open</button><button onclick="rpbDeletePlayer('${p.id}')" class="btn-danger">Del</button></div></div>`;
      }).join('');
      h += '</div>';
      c.innerHTML = h; return;
    }

    if (state.view === 'profile') {
      if (!state.activePlayerId || !state.players[state.activePlayerId]) { c.innerHTML = `<div class="rpb-empty">Select a player from Players tab.</div>`; return; }
